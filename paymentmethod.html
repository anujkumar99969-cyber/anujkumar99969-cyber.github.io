<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPI Payment</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f3f6fb;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:350px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ddd;
    border-radius:8px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#0f9d58;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0c7d46;
}
</style>
</head>

<body>

<div class="container">

<h2>UPI Payment</h2>

<input type="number" id="amount" placeholder="Enter Amount">

<button onclick="payNow()">
Pay Now
</button>

</div>

<script>

function payNow(){

let amount =
document.getElementById("amount").value;

if(amount==="" || amount<=0){
alert("Enter valid amount");
return;
}

let upi =
`upi://pay?
pa=Kumaranuj83041@ybl
&pn=Anuj%20Kumar
&am=${amount}
&cu=INR
&tn=Website Payment`;

upi = upi.replace(/\s/g,'');

window.location.href = upi;

}

</script>

</body>
</html>
